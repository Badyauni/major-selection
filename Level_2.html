<html lang="en" dir="ltr">

<meta charset="UTF-8">

<title>Specialization Discovery – Badya University</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f1f5f9;--panel:#ffffff;--card:#ffffff;--card-t:#0f172a;
  --teal:#06b6d4;--teal-d:#0891b2;--teal-l:#ecfeff;
  --muted:#64748b;--white:#0f172a;--success:#10b981;--radius:18px;
  --brd:rgba(15,23,42,.08);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;color:var(--white);overflow-x:hidden}
body::before{content:'';position:fixed;top:-200px;left:-200px;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(6,182,212,.1) 0%,transparent 65%);pointer-events:none}
[dir="rtl"] body{font-family:'Cairo',sans-serif}
[dir="rtl"] .hero-t,[dir="rtl"] .sh-title,[dir="rtl"] .rspec{font-family:'Cairo',sans-serif}
[dir="rtl"] .excard{border-left:none;border-right:4px solid var(--teal);border-radius:var(--radius) 0 0 var(--radius)}
[dir="rtl"] .pbar-lbl{text-align:left}
[dir="rtl"] .iitem{flex-direction:row-reverse;text-align:right}
[dir="rtl"] .hero-d,[dir="rtl"] .sh-sub,[dir="rtl"] .excard p{text-align:right}

.app{max-width:680px;margin:0 auto;padding:0 18px;min-height:100vh;display:flex;flex-direction:column}
.topbar{padding:18px 0 8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.uni-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(6,182,212,.1);
  border:1px solid rgba(6,182,212,.25);border-radius:50px;padding:5px 14px;font-size:11px;
  color:var(--teal);letter-spacing:.06em;text-transform:uppercase;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:8px}
.year-tag{font-size:11px;color:var(--white);border:1px solid rgba(15,23,42,.12);padding:5px 14px;border-radius:50px}
.lang-btn{font-size:12px;font-weight:700;background:rgba(15,23,42,.04);border:1px solid rgba(15,23,42,.12);
  color:var(--white);padding:5px 14px;border-radius:50px;cursor:pointer;transition:all .2s;font-family:inherit}
.lang-btn:hover{background:rgba(15,23,42,.08);border-color:rgba(15,23,42,.3)}

.screen{display:none;flex-direction:column;flex:1;padding:14px 0 52px;animation:fup .4s ease}
.screen.active{display:flex}
@keyframes fup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes slin{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}

.eyebrow{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin:24px 0 10px}
.hero-t{font-family:'Sora',sans-serif;font-size:clamp(2rem,6vw,2.9rem);line-height:1.15;margin-bottom:16px;font-weight:700}
.hero-t em{color:var(--teal-d);font-style:normal}
.hero-d{font-size:15px;color:var(--white);line-height:1.75;max-width:540px;margin-bottom:28px}
.specs{background:var(--panel);border:1px solid var(--brd);border-radius:var(--radius);padding:20px;margin-bottom:24px;box-shadow:0 1px 3px rgba(15,23,42,.04)}
.spec-row{display:flex;align-items:center;gap:12px;font-size:14px;color:#334155;padding:6px 0}
.spec-row:not(:last-child){border-bottom:1px solid rgba(15,23,42,.06)}
.spec-row strong{color:#0f172a}
.spec-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}
[dir="rtl"] .spec-row{flex-direction:row-reverse}
.tracks{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:28px}
.track-pill{background:var(--panel);border:1px solid var(--brd);border-radius:12px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(15,23,42,.04)}
.track-pill .tp{font-size:18px;display:block;margin-bottom:4px}
.track-pill span{font-size:12px;color:#334155;font-weight:500;line-height:1.3;display:block}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 26px;
  border-radius:50px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;
  border:none;transition:all .22s cubic-bezier(.4,0,.2,1);line-height:1}
[dir="rtl"] .btn{font-family:'Cairo',sans-serif}
.btn-t{background:var(--teal);color:#000}
.btn-t:hover{background:var(--teal-d);transform:translateY(-2px);box-shadow:0 8px 24px rgba(6,182,212,.3)}
.btn-o{background:transparent;color:var(--muted);border:1.5px solid rgba(15,23,42,.15)}
.btn-o:hover{border-color:rgba(15,23,42,.3);color:var(--white)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-w{width:100%}

.card{background:var(--card);color:var(--card-t);border-radius:var(--radius);padding:24px;margin-bottom:12px;
  box-shadow:0 2px 20px rgba(15,23,42,.07);border:1px solid var(--brd)}
.fg{margin-bottom:15px}
.fl{display:block;font-size:10px;font-weight:700;color:#64748b;letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px}
.fi{width:100%;padding:12px 15px;border:2px solid #e2e8f0;border-radius:12px;font-family:'DM Sans',sans-serif;
  font-size:15px;color:var(--card-t);outline:none;background:#f8fafc;transition:border-color .2s}
[dir="rtl"] .fi{font-family:'Cairo',sans-serif;text-align:right}
.fi:focus{border-color:var(--teal);background:#fff;box-shadow:0 0 0 3px rgba(6,182,212,.1)}
.fi::placeholder{color:#cbd5e1}

.ilist{list-style:none;display:flex;flex-direction:column;gap:12px;margin-bottom:26px}
.iitem{display:flex;gap:13px;align-items:flex-start;font-size:14px;color:#1e293b;line-height:1.65}
.iicon{width:32px;height:32px;background:rgba(6,182,212,.12);border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}

.pbar-wrap{background:var(--panel);border:1px solid var(--brd);border-radius:14px;
  padding:13px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 3px rgba(15,23,42,.04)}
.pbar-track{flex:1;height:7px;background:rgba(15,23,42,.08);border-radius:50px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--teal-d),var(--teal));border-radius:50px;
  transition:width .5s cubic-bezier(.4,0,.2,1);min-width:3px}
.pbar-lbl{font-size:12px;color:var(--muted);white-space:nowrap;font-weight:600;min-width:50px;text-align:right}
.pdots{display:flex;gap:5px;justify-content:center;margin-bottom:10px}
.pdot{height:5px;border-radius:50px;background:rgba(15,23,42,.12);transition:all .3s;width:5px}
.pdot.done{background:rgba(6,182,212,.45)}
.pdot.active{background:var(--teal);width:18px}

.qcard{background:var(--card);color:var(--card-t);border-radius:var(--radius);padding:22px;margin-bottom:10px;animation:slin .28s ease;box-shadow:0 2px 20px rgba(15,23,42,.07);border:1px solid var(--brd)}
.qmeta{font-size:11px;font-weight:700;color:var(--teal-d);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px}
.qtext{font-size:17px;font-weight:500;line-height:1.6;color:#0f172a;margin-bottom:20px}
[dir="rtl"] .qtext{text-align:right;font-family:'Cairo',sans-serif}
.lkwrap{display:flex;flex-direction:column;gap:7px}
.lkends{display:flex;justify-content:space-between;font-size:10px;color:#94a3b8;padding:0 2px;margin-bottom:3px}
.lkrow{display:flex;gap:5px}
.lopt{flex:1}
.lopt input{display:none}
.lopt label{display:flex;flex-direction:column;align-items:center;gap:3px;padding:11px 4px;
  border-radius:10px;border:2px solid #e2e8f0;cursor:pointer;transition:all .2s;background:#f8fafc}
.lopt label .ln{font-size:16px;font-weight:700;color:#94a3b8;line-height:1}
.lopt label .lt{font-size:9px;color:#94a3b8;text-align:center;line-height:1.2}
.lopt input:checked+label{border-color:var(--teal);background:var(--teal-l)}
.lopt input:checked+label .ln,.lopt input:checked+label .lt{color:var(--teal-d)}
.lopt label:hover{border-color:#d1d5db;background:#f1f5f9}
.lopt input:checked+label:hover{border-color:var(--teal);background:var(--teal-l)}
.qnav{display:flex;gap:10px;margin-top:4px}
.qnav .btn{flex:1}

.rhero{background:linear-gradient(145deg,#ecfeff 0%,#ffffff 100%);
  border:1px solid rgba(6,182,212,.4);border-radius:var(--radius);padding:28px;text-align:center;margin-bottom:12px;box-shadow:0 4px 24px rgba(6,182,212,.1)}
.rlbl{display:inline-block;background:var(--teal);color:#000;border-radius:50px;
  padding:5px 18px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.rspec{font-family:'Sora',sans-serif;font-size:clamp(1.4rem,5vw,2rem);color:var(--white);margin-bottom:7px;line-height:1.2}
.rtag{font-size:13px;color:var(--muted);font-style:italic;margin-bottom:12px}
.cconf{display:flex;align-items:center;justify-content:center;gap:7px;font-size:13px;color:var(--muted)}
.cbadge{padding:3px 13px;border-radius:50px;font-size:12px;font-weight:700}
.ch{background:rgba(16,185,129,.15);color:#059669}
.cm{background:rgba(6,182,212,.18);color:var(--teal-d)}
.cl{background:rgba(100,116,139,.15);color:var(--muted)}
.srow{margin-bottom:11px}
.shdr{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:5px;color:#475569}
.sval{color:#0f172a;font-weight:700}
.strk{height:9px;background:rgba(15,23,42,.08);border-radius:50px;overflow:hidden}
.sfill{height:100%;border-radius:50px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.s0{background:linear-gradient(90deg,#ec4899,#f9a8d4)}
.s1{background:linear-gradient(90deg,#6366f1,#a5b4fc)}
.s2{background:linear-gradient(90deg,#10b981,#6ee7b7)}
.s3{background:linear-gradient(90deg,#06b6d4,#67e8f9)}
.radar-wrap{display:flex;justify-content:center;margin:8px 0}
.radar-wrap svg{width:250px;height:250px}
.dimg{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:8px;margin-top:10px}
.dcard{background:var(--panel);border:1px solid var(--brd);border-radius:12px;padding:13px 8px;text-align:center;box-shadow:0 1px 3px rgba(15,23,42,.04)}
.dscore{font-family:'Sora',sans-serif;font-size:20px;color:var(--teal-d);display:block;line-height:1}
[dir="rtl"] .dscore{font-family:'Cairo',sans-serif}
.dname{font-size:9px;color:#475569;margin-top:5px;text-transform:uppercase;letter-spacing:.04em;line-height:1.3;display:block}
[dir="rtl"] .dname{font-size:10px;letter-spacing:0;text-transform:none}
.excard{background:#ecfeff;border-left:4px solid var(--teal);
  border-radius:0 var(--radius) var(--radius) 0;padding:18px 20px;margin-bottom:12px}
.excard p{font-size:14px;line-height:1.85;color:#334155}
.alts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:12px}
.alt-item{background:var(--card);color:var(--card-t);border-radius:14px;padding:14px;
  display:flex;align-items:center;justify-content:space-between;gap:8px}
.alt-item .ai p{font-size:13px;font-weight:600;color:#0f172a;margin-bottom:2px}
.alt-item .ai span{font-size:11px;color:#64748b}
.alt-rank{background:#f1f5f9;color:#64748b;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:700;white-space:nowrap}
.alt-rank.r2{background:#eff6ff;color:#3b82f6}
.alt-rank.r3{background:#f0fdf4;color:#16a34a}
.tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
.tag{background:#f1f5f9;color:#334155;padding:5px 13px;border-radius:50px;font-size:12px;font-weight:500}
.slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--teal-d);margin-bottom:7px;display:block}
[dir="rtl"] .slbl{text-align:right;letter-spacing:0;font-size:11px;text-transform:none}
.smsg{text-align:center;font-size:13px;color:var(--muted);padding:12px;margin-bottom:6px}
.smsg.ok{color:var(--success)}.smsg.err{color:#f87171}
.sh-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--teal);display:block;margin-bottom:5px}
[dir="rtl"] .sh-lbl{text-align:right;letter-spacing:0;font-size:12px;text-transform:none}
.sh-title{font-family:'Sora',sans-serif;font-size:1.4rem;margin-bottom:4px}
[dir="rtl"] .sh-title{text-align:right}
@media(max-width:480px){
  .tracks{grid-template-columns:1fr 1fr}
  .lopt label .lt{display:none}
  .alts-grid{grid-template-columns:1fr}
}
@media print{
  body{background:#fff;color:#000}
  .btn,.qnav,.topbar,.pdots,.pbar-wrap{display:none!important}
  .screen:not(.active){display:none}
  .rhero,.excard{border:1px solid #ccc;background:#f9f9f9}
}
</style>

function dots(){
  const el=document.getElementById('pdots'); el.innerHTML='';
  for(let i=0;i<TOTPG;i++){const d=document.createElement('div');
    d.className='pdot'+(i===pg?' active':i<pg?' done':'');el.appendChild(d);}
}

function rpage(){
  const c=document.getElementById('qcont'),st=pg*PG; c.innerHTML='';
  const qs=t('questions');
  Qs.slice(st,st+PG).forEach((q,qi)=>{
    const el=document.createElement('div'); el.className='qcard';
    el.innerHTML=`<p class="qmeta">${t('q_label')} ${q.id} ${t('q_of')} ${Qs.length}</p>
      <p class="qtext">${qs[st+qi]}</p>
      <div class="lkwrap">
        <div class="lkends"><span>${t('sd')}</span><span>${t('sa')}</span></div>
        <div class="lkrow">${[1,2,3,4,5].map(v=>`
          <div class="lopt"><input type="radio" name="q${q.id}" id="q${q.id}v${v}" value="${v}"
            ${ans[q.id]===v?'checked':''} onchange="rec(${q.id},${v})">
          <label for="q${q.id}v${v}"><span class="ln">${v}</span>
            <span class="lt">${t('likert')[v-1]}</span></label></div>`).join('')}

    c.appendChild(el);});
  ui();
}

function rec(id,v){ans[id]=v;ui();}

function ui(){
  const st=pg*PG,pq=Qs.slice(st,st+PG),all=pq.every(q=>ans[q.id]!==undefined);
  const tot=Object.keys(ans).length;
  document.getElementById('pbar').style.width=(tot/Qs.length*100)+'%';
  document.getElementById('pbarlbl').textContent=`${tot} / ${Qs.length}`;
  document.getElementById('bnext').disabled=!all;
  document.getElementById('bprev').style.visibility=pg===0?'hidden':'visible';
  document.getElementById('bprev').textContent=t('back_q');
  document.getElementById('bnext').textContent=pg===TOTPG-1?t('see_results'):t('next_q');
}

function nav(d){
  if(d===1&&pg===TOTPG-1){calc();return;}
  pg+=d; dots(); rpage(); window.scrollTo(0,0);
}

function score(){
  const m={CR:[],LS:[],FQ:[],TA:[],SC:[]};
  Qs.forEach(q=>{let v=ans[q.id];if(q.r)v=6-v;m[q.d].push(v);});
  const ds={};for(const[k,vs]of Object.entries(m))ds[k]=vs.reduce((a,b)=>a+b)/vs.length;
  const os={};for(const[k,wt]of Object.entries(WTS)){let s=0;
    for(const[d,w]of Object.entries(wt))s+=w*ds[d];os[k]=(s-1)/4*100;}
  return{ds,os};
}

function calc(){
  const{ds,os}=score(); lastScores={ds,os}; submitStatus=null;
  renderResults(ds,os,true);
}

function mkRadar(ds,col){
  const cx=125,cy=125,R=88,Rl=112,keys=Object.keys(ds),n=keys.length;
  const pt=(r,i)=>{const a=-Math.PI/2+i*2*Math.PI/n;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];};
  let g='',ax='',lb='';
  for(let lv=1;lv<=5;lv++){g+=`<polygon points="${keys.map((_,i)=>pt(R*lv/5,i).join(',')).join(' ')}"
    fill="none" stroke="rgba(15,23,42,.1)" stroke-width="1"/>`;}
  keys.forEach((_,i)=>{const[x2,y2]=pt(R,i);
    ax+=`<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="rgba(15,23,42,.12)" stroke-width="1"/>`;
    const[lx,ly]=pt(Rl,i);
    lb+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle"
      font-size="12" font-family="Cairo,DM Sans,sans-serif" fill="#0f172a" font-weight="600">${t('dim')[keys[i]]}</text>`;});
  const dp=keys.map((k,i)=>pt(R*(ds[k]/5),i).join(',')).join(' ');
  const dts=keys.map((k,i)=>{const[px,py]=pt(R*(ds[k]/5),i);
    return`<circle cx="${px}" cy="${py}" r="4.5" fill="${col}" stroke="rgba(0,0,0,.25)" stroke-width="1"/>`;}).join('');
  return`<svg viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
    ${g}${ax}<polygon points="${dp}" fill="${col}20" stroke="${col}" stroke-width="2" stroke-linejoin="round"/>
    ${dts}${lb}</svg>`;
}

        <div class="tags">${topS.courses.map(c=>`<span class="tag">${c}</span>`).join('')}</div>
      </div>
      <div style="background:var(--panel);border:1px solid rgba(15,23,42,.08);border-radius:var(--radius);padding:18px;margin-bottom:12px;box-shadow:0 1px 3px rgba(15,23,42,.04)">
        <span class="slbl" style="color:var(--teal-d)">${t('careers_lbl')}</span>
        <div class="tags">${topS.careers.map(c=>`<span class="tag">${c}</span>`).join('')}</div>
      </div>
      <div style="margin-bottom:12px">
        <span class="slbl" style="color:var(--teal-d)">${t('alt_lbl')}</span>
        <div class="alts-grid">
          ${sorted.slice(1,3).map(([k,v],i)=>{const s=specs.find(x=>x.key===k);
            return`<div class="alt-item"><div class="ai"><p>${s.name}</p><span>${v.toFixed(1)}%</span></div>
              <span class="alt-rank ${i===0?'r2':'r3'}">#${i+2}</span></div>`;}).join('')}
        </div>
      </div>
      <div id="smsg" class="smsg">${t('saving')}</div>
      <button class="btn btn-t btn-w" onclick="window.print()" style="margin-bottom:10px">${t('print')}</button>
      <button class="btn btn-o btn-w" onclick="location.reload()">${t('retake')}</button>
      <p style="text-align:center;font-size:11px;color:var(--muted);margin-top:12px">${t('footer')}</p>
    </div>`;
  curScreen='s-results';
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-results').classList.add('active');
  window.scrollTo(0,0);
  setTimeout(()=>{document.querySelectorAll('.sfill[data-w]').forEach(el=>{el.style.width=el.dataset.w+'%';});},120);
  const smsg=document.getElementById('smsg');
  if(!doSubmit&&submitStatus){
    if(submitStatus==='ok'){smsg.textContent=t('saved');smsg.className='smsg ok';}
    else if(submitStatus==='err'){smsg.textContent=t('error');smsg.className='smsg err';}
    else smsg.textContent=t('not_configured');
  } else { submit(ds,os,topS.name,cl,sorted); }
}

function submit(ds,os,rec,conf,sorted){
  const el=document.getElementById('smsg');
  if(SHEETS_URL==='YOUR_GOOGLE_APPS_SCRIPT_URL_HERE'){
    el.textContent=t('not_configured'); submitStatus='not_configured'; return;}
  const specs=t('specializations');
  const r2=specs.find(s=>s.key===sorted[1][0])?.name||'';
  const r3=specs.find(s=>s.key===sorted[2][0])?.name||'';
  fetch(SHEETS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({timestamp:new Date().toISOString(),name:stu.name,email:stu.email,
      studentId:stu.studentId,answers:ans,dimScores:ds,outcomes:os,
      recommendation:rec,confidence:conf,rank2:r2,rank3:r3})
  }).then(()=>{el.textContent=t('saved');el.className='smsg ok';submitStatus='ok';})
   .catch(()=>{el.textContent=t('error');el.className='smsg err';submitStatus='err';});
}

renderTopbar(); renderWelcome();
</script>
</body>
</html>
